openapi: 3.0.3
info:
  title: GroupShop MVP API
  version: 0.9.0
  description: Machine-checkable API contract for implemented MVP batches.
servers:
  - url: /
tags:
  - name: Health
  - name: Auth
  - name: Store
  - name: Product
  - name: GroupBuy
  - name: GroupBuyPublic
  - name: Address
  - name: OrderAdmin
  - name: Order
  - name: Leader
  - name: StoreOrder
  - name: Subscription
  - name: MemberCard
paths:
  /api/v1/health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Application health status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSuccessResponse'
  /api/v1/auth/mock-login:
    post:
      tags:
        - Auth
      summary: Mock login for MVP development.
      operationId: mockLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockLoginRequest'
      responses:
        '200':
          description: Login succeeded and an access token was issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockLoginSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /api/v1/me:
    get:
      tags:
        - Auth
      summary: Get current user context.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user, with optional leader and store summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/stores:
    post:
      tags:
        - Store
      summary: Create a store for the current user.
      operationId: createStore
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoreRequest'
      responses:
        '200':
          description: Store created successfully, along with leader info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/StoreAlreadyExistsError'
  /api/v1/my/store:
    get:
      tags:
        - Store
      summary: Get the current user's store.
      operationId: getMyStore
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user's store, or success with no data if no store exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyStoreSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    patch:
      tags:
        - Store
      summary: Partial update the current user's store.
      operationId: updateMyStore
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStoreRequest'
      responses:
        '200':
          description: Store updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
  # ── Product endpoints ──────────────────────────────────────────────
  /api/v1/my/store/products:
    get:
      tags:
        - Product
      summary: List products of the current user's store.
      operationId: getMyStoreProducts
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of products (excluding soft-deleted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
    post:
      tags:
        - Product
      summary: Create a product for the current user's store.
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '200':
          description: Product created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
  /api/v1/my/store/products/{productId}:
    get:
      tags:
        - Product
      summary: Get a product by id.
      operationId: getProduct
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags:
        - Product
      summary: Partial update a product.
      operationId: updateProduct
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags:
        - Product
      summary: Soft-delete a product.
      operationId: deleteProduct
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product soft-deleted successfully (empty data).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  # ── GroupBuy endpoints ─────────────────────────────────────────────
  /api/v1/my/store/group-buys:
    post:
      tags:
        - GroupBuy
      summary: Create and publish a group buy.
      operationId: createGroupBuy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupBuyRequest'
      responses:
        '200':
          description: Group buy created and published.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
    get:
      tags:
        - GroupBuy
      summary: List group buys of the current user's store.
      operationId: getMyStoreGroupBuys
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of group buys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuyPageSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
  /api/v1/my/store/group-buys/{groupBuyId}:
    get:
      tags:
        - GroupBuy
      summary: Get a group buy with items.
      operationId: getGroupBuy
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Group buy detail with items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags:
        - GroupBuy
      summary: Partial update a group buy.
      operationId: updateGroupBuy
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupBuyRequest'
      responses:
        '200':
          description: Group buy updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'
  /api/v1/my/store/group-buys/{groupBuyId}/end:
    post:
      tags:
        - GroupBuy
      summary: End a published group buy.
      operationId: endGroupBuy
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Group buy ended successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'
  /api/v1/group-buys:
    get:
      tags:
        - GroupBuyPublic
      summary: List public published group buys.
      operationId: listPublicGroupBuys
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of public group buys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicGroupBuyPageSuccessResponse'
  /api/v1/group-buys/{groupBuyId}:
    get:
      tags:
        - GroupBuyPublic
      summary: Get public group buy detail.
      operationId: getPublicGroupBuyDetail
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Group buy detail with leader, store, items and viewer info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuyDetailSuccessResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/leaders/{leaderId}/homepage:
    get:
      tags:
        - Leader
      summary: Get leader homepage with store and group buys.
      operationId: getLeaderHomepage
      parameters:
        - name: leaderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Leader homepage with store info and paginated group buys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderHomepageSuccessResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/my/addresses:
    get:
      tags:
        - Address
      summary: List current user's addresses.
      operationId: listAddresses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of addresses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressListSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags:
        - Address
      summary: Create a new address.
      operationId: createAddress
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAddressRequest'
      responses:
        '200':
          description: Address created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/my/addresses/{addressId}:
    patch:
      tags:
        - Address
      summary: Partial update an address.
      operationId: updateAddress
      security:
        - bearerAuth: []
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressRequest'
      responses:
        '200':
          description: Address updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/AddressForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags:
        - Address
      summary: Delete an address.
      operationId: deleteAddress
      security:
        - bearerAuth: []
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Address deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/AddressForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/orders/preview:
    post:
      tags:
        - Order
      summary: Preview an order (no order created, no stock deducted).
      operationId: previewOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderPreviewRequest'
      responses:
        '200':
          description: Order preview with amounts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPreviewSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/AddressForbiddenError'
        '422':
          $ref: '#/components/responses/GroupBuyNotPurchasableError'
          # Also: GROUP_BUY_ENDED, ITEM_NOT_IN_GROUP_BUY, INSUFFICIENT_STOCK
  /api/v1/orders:
    post:
      tags:
        - Order
      summary: Create an order.
      operationId: createOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '200':
          description: Order created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/AddressForbiddenError'
        '422':
          $ref: '#/components/responses/GroupBuyNotPurchasableError'
  /api/v1/my/orders:
    get:
      tags:
        - Order
      summary: List current user's orders.
      operationId: listMyOrders
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated order list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPageSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/my/orders/{orderId}:
    get:
      tags:
        - Order
      summary: Get order detail.
      operationId: getMyOrder
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/orders/{orderId}/cancel:
    post:
      tags:
        - Order
      summary: Cancel an order (only pending-pay unpaid orders).
      operationId: cancelOrder
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order canceled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/OrderNotCancelableError'
  /api/v1/orders/{orderId}/simulate-pay:
    post:
      tags:
        - Order
      summary: Simulate payment for an order.
      operationId: simulatePay
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Payment simulated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/OrderAlreadyPaidError'
        '422':
          $ref: '#/components/responses/OrderNotPayableError'
          # Also: INSUFFICIENT_STOCK
  /api/v1/my/store/orders:
    get:
      tags:
        - StoreOrder
      summary: List orders for the current user's store.
      operationId: listStoreOrders
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated store order list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPageSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
  /api/v1/my/store/orders/{orderId}:
    get:
      tags:
        - StoreOrder
      summary: Get store order detail.
      operationId: getStoreOrder
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Store order detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
          # Also: STORE_FORBIDDEN
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/my/store/orders/{orderId}/ship:
    post:
      tags:
        - StoreOrder
      summary: Ship an order (create shipment, mark order as shipped).
      operationId: shipOrder
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipOrderRequest'
      responses:
        '200':
          description: Order shipped successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipOrderSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/OrderAlreadyShippedError'
        '422':
          $ref: '#/components/responses/OrderNotShippableError'
  /api/v1/leaders/{leaderId}/subscription:
    post:
      tags:
        - Subscription
      summary: Subscribe to a leader.
      operationId: subscribe
      security:
        - bearerAuth: []
      parameters:
        - name: leaderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequest'
      responses:
        '200':
          description: Subscribed successfully (idempotent).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags:
        - Subscription
      summary: Cancel subscription to a leader.
      operationId: cancelSubscription
      security:
        - bearerAuth: []
      parameters:
        - name: leaderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Subscription canceled (idempotent, returns empty data).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/my/subscriptions:
    get:
      tags:
        - Subscription
      summary: List current user's active subscriptions.
      operationId: listMySubscriptions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of active subscriptions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionListSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
