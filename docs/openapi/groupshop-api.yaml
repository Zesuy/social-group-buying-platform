openapi: 3.0.3
info:
  title: GroupShop MVP API
  version: 0.10.0
  description: Machine-checkable API contract for implemented MVP batches.
servers:
  - url: /
tags:
  - name: Health
  - name: Auth
  - name: Store
  - name: Product
  - name: GroupBuy
  - name: GroupBuyPublic
  - name: Address
  - name: OrderAdmin
  - name: Order
  - name: Leader
  - name: StoreOrder
  - name: Subscription
  - name: MemberCard
  - name: Category
  - name: Favorite
  - name: BrowsingHistory
  - name: Cart
paths:
  /api/v1/health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Application health status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSuccessResponse'
  /api/v1/auth/mock-login:
    post:
      tags:
        - Auth
      summary: Mock login for MVP development.
      operationId: mockLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockLoginRequest'
      responses:
        '200':
          description: Login succeeded and an access token was issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockLoginSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /api/v1/me:
    get:
      tags:
        - Auth
      summary: Get current user context.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user, with optional leader and store summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/stores:
    post:
      tags:
        - Store
      summary: Create a store for the current user.
      operationId: createStore
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoreRequest'
      responses:
        '200':
          description: Store created successfully, along with leader info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/StoreAlreadyExistsError'
  /api/v1/my/store:
    get:
      tags:
        - Store
      summary: Get the current user's store.
      operationId: getMyStore
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user's store, or success with no data if no store exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyStoreSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    patch:
      tags:
        - Store
      summary: Partial update the current user's store.
      operationId: updateMyStore
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStoreRequest'
      responses:
        '200':
          description: Store updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
  # ── Product endpoints ──────────────────────────────────────────────
  /api/v1/my/store/products:
    get:
      tags:
        - Product
      summary: List products of the current user's store.
      operationId: getMyStoreProducts
      security:
        - bearerAuth: []
      parameters:
        - name: keyword
          in: query
          required: false
          schema:
            type: string
          description: Search by product name keyword
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
          description: Filter by category
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: active / inactive / deleted
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of products (excluding soft-deleted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
    post:
      tags:
        - Product
      summary: Create a product for the current user's store.
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '200':
          description: Product created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
  /api/v1/my/store/products/{productId}:
    get:
      tags:
        - Product
      summary: Get a product by id.
      operationId: getProduct
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            description: ID（string）
      responses:
        '200':
          description: Product detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags:
        - Product
      summary: Partial update a product.
      operationId: updateProduct
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            description: ID（string）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags:
        - Product
      summary: Soft-delete a product.
      operationId: deleteProduct
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            description: ID（string）
      responses:
        '200':
          description: Product soft-deleted successfully (empty data).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/my/store/products/{productId}/usages:
    get:
      tags:
        - Product
      summary: List group buys that reference this product.
      operationId: getProductUsages
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            description: ID（string）
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of group buys referencing this product.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductUsagePageSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  # ── GroupBuy endpoints ─────────────────────────────────────────────
  /api/v1/my/store/group-buys:
    post:
      tags:
        - GroupBuy
      summary: Create and publish a group buy.
      operationId: createGroupBuy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupBuyRequest'
      responses:
        '200':
          description: Group buy created and published.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
    get:
      tags:
        - GroupBuy
      summary: List group buys of the current user's store.
      operationId: getMyStoreGroupBuys
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of group buys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuyPageSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
  /api/v1/my/store/group-buys/{groupBuyId}:
    get:
      tags:
        - GroupBuy
      summary: Get a group buy with items.
      operationId: getGroupBuy
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: string
            description: ID（string）
      responses:
        '200':
          description: Group buy detail with items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags:
        - GroupBuy
      summary: Partial update a group buy.
      operationId: updateGroupBuy
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: string
            description: ID（string）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupBuyRequest'
      responses:
        '200':
          description: Group buy updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'
  /api/v1/my/store/group-buys/{groupBuyId}/end:
    post:
      tags:
        - GroupBuy
      summary: End a published group buy.
      operationId: endGroupBuy
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: string
            description: ID（string）
      responses:
        '200':
          description: Group buy ended successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'
  # ── GroupBuy Draft ───────────────────────────────────────────────
  /api/v1/my/store/group-buys/drafts:
    post:
      tags:
        - GroupBuy
      summary: Create a group buy draft (minimal validation).
      operationId: createDraft
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDraftGroupBuyRequest'
      responses:
        '200':
          description: Draft created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
  /api/v1/my/store/group-buys/{groupBuyId}/publish:
    post:
      tags:
        - GroupBuy
      summary: Publish a draft group buy.
      operationId: publishDraft
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Group buy published.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'
  /api/v1/my/store/group-buys/{groupBuyId}/preview:
    get:
      tags:
        - GroupBuy
      summary: Preview a group buy (any status) for the owning leader.
      operationId: previewGroupBuy
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preview data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuyDetailSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/my/store/group-buys/{groupBuyId}/copy:
    post:
      tags:
        - GroupBuy
      summary: Copy a group buy as a new draft.
      operationId: copyGroupBuy
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Copy created as draft.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/my/store/group-buys/{groupBuyId}/permission:
    patch:
      tags:
        - GroupBuy
      summary: Update group buy visibility (public/hidden).
      operationId: updatePermission
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - visibility
              properties:
                visibility:
                  type: string
                  enum: [public, hidden]
      responses:
        '200':
          description: Visibility updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'
  /api/v1/my/store/group-buys/{groupBuyId}/share-card:
    post:
      tags:
        - GroupBuy
      summary: Get or create a share card for a group buy.
      operationId: getShareCard
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Share card data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareCardSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  # ── Share token public access ───────────────────────────────────
  /api/v1/share/group-buys/{shareToken}:
    get:
      tags:
        - GroupBuyPublic
      summary: Get group buy detail via share token (supports hidden group buys).
      operationId: getGroupBuyByShareToken
      parameters:
        - name: shareToken
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Group buy detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuyDetailSuccessResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/group-buys:
    get:
      tags:
        - GroupBuyPublic
      summary: List public published group buys.
      operationId: listPublicGroupBuys
      parameters:
        - name: keyword
          in: query
          required: false
          schema:
            type: string
          description: Keyword search matching title, introduction, display name and product name
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
          description: Filter by product category
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: latitude
          in: query
          required: false
          schema:
            type: number
            format: double
          description: 用户纬度（WGS84），与 longitude 同时提供
        - name: longitude
          in: query
          required: false
          schema:
            type: number
            format: double
          description: 用户经度（WGS84），与 latitude 同时提供
        - name: maxDistanceMeters
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: 距离筛选（米），需同时提供 latitude/longitude
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [distance]
          description: 排序方式，distance 表示按距离升序，需同时提供 latitude/longitude
      responses:
        '200':
          description: Paginated list of public group buys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicGroupBuyPageSuccessResponse'
  /api/v1/group-buys/{groupBuyId}:
    get:
      tags:
        - GroupBuyPublic
      summary: Get public group buy detail.
      operationId: getPublicGroupBuyDetail
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: string
            description: ID（string）
        - name: latitude
          in: query
          required: false
          schema:
            type: number
            format: double
          description: 用户纬度（WGS84），与 longitude 同时提供
        - name: longitude
          in: query
          required: false
          schema:
            type: number
            format: double
          description: 用户经度（WGS84），与 latitude 同时提供
      responses:
        '200':
          description: Group buy detail with leader, store, items and viewer info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuyDetailSuccessResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/group-buys/{groupBuyId}/favorite:
    post:
      tags:
        - Favorite
      summary: Favorite a group buy.
      operationId: favorite
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: string
            description: ID（string）
      responses:
        '200':
          description: Favorited successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags:
        - Favorite
      summary: Cancel a group buy favorite.
      operationId: cancelFavorite
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: string
            description: ID（string）
      responses:
        '200':
          description: Favorite canceled (empty data).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/categories:
    get:
      tags:
        - Category
      summary: List all active product categories.
      operationId: listCategories
      responses:
        '200':
          description: List of active categories.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListSuccessResponse'
  /api/v1/leaders/{leaderId}/homepage:
    get:
      tags:
        - Leader
      summary: Get leader homepage with store and group buys.
      operationId: getLeaderHomepage
      parameters:
        - name: leaderId
          in: path
          required: true
          schema:
            type: string
            description: ID（string）
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Leader homepage with store info and paginated group buys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderHomepageSuccessResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/v1/my/addresses:
    get:
      tags:
        - Address
      summary: List current user's addresses.
      operationId: listAddresses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of addresses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressListSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      tags:
        - Address
      summary: Create a new address.
      operationId: createAddress
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAddressRequest'
      responses:
        '200':
          description: Address created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/my/addresses/{addressId}:
    patch:
      tags:
        - Address
      summary: Partial update an address.
      operationId: updateAddress
      security:
        - bearerAuth: []
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: string
            description: ID（string）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressRequest'
      responses:
        '200':
          description: Address updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/AddressForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
