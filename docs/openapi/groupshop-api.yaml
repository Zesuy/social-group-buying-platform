openapi: 3.0.3
info:
  title: GroupShop MVP API
  version: 0.3.0
  description: Machine-checkable API contract for implemented MVP batches.
servers:
  - url: /
tags:
  - name: Health
  - name: Auth
  - name: Store
  - name: Product
  - name: GroupBuy
paths:
  /api/v1/health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Application health status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSuccessResponse'
  /api/v1/auth/mock-login:
    post:
      tags:
        - Auth
      summary: Mock login for MVP development.
      operationId: mockLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockLoginRequest'
      responses:
        '200':
          description: Login succeeded and an access token was issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockLoginSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /api/v1/me:
    get:
      tags:
        - Auth
      summary: Get current user context.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user, with optional leader and store summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /api/v1/stores:
    post:
      tags:
        - Store
      summary: Create a store for the current user.
      operationId: createStore
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoreRequest'
      responses:
        '200':
          description: Store created successfully, along with leader info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/StoreAlreadyExistsError'
  /api/v1/my/store:
    get:
      tags:
        - Store
      summary: Get the current user's store.
      operationId: getMyStore
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user's store, or success with no data if no store exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyStoreSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    patch:
      tags:
        - Store
      summary: Partial update the current user's store.
      operationId: updateMyStore
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStoreRequest'
      responses:
        '200':
          description: Store updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
  # ── Product endpoints ──────────────────────────────────────────────
  /api/v1/my/store/products:
    get:
      tags:
        - Product
      summary: List products of the current user's store.
      operationId: getMyStoreProducts
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of products (excluding soft-deleted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
    post:
      tags:
        - Product
      summary: Create a product for the current user's store.
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '200':
          description: Product created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
  /api/v1/my/store/products/{productId}:
    get:
      tags:
        - Product
      summary: Get a product by id.
      operationId: getProduct
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags:
        - Product
      summary: Partial update a product.
      operationId: updateProduct
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags:
        - Product
      summary: Soft-delete a product.
      operationId: deleteProduct
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product soft-deleted successfully (empty data).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  # ── GroupBuy endpoints ─────────────────────────────────────────────
  /api/v1/my/store/group-buys:
    post:
      tags:
        - GroupBuy
      summary: Create and publish a group buy.
      operationId: createGroupBuy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupBuyRequest'
      responses:
        '200':
          description: Group buy created and published.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
    get:
      tags:
        - GroupBuy
      summary: List group buys of the current user's store.
      operationId: getMyStoreGroupBuys
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of group buys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuyPageSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
  /api/v1/my/store/group-buys/{groupBuyId}:
    get:
      tags:
        - GroupBuy
      summary: Get a group buy with items.
      operationId: getGroupBuy
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Group buy detail with items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags:
        - GroupBuy
      summary: Partial update a group buy.
      operationId: updateGroupBuy
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupBuyRequest'
      responses:
        '200':
          description: Group buy updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'
  /api/v1/my/store/group-buys/{groupBuyId}/end:
    post:
      tags:
        - GroupBuy
      summary: End a published group buy.
      operationId: endGroupBuy
      security:
        - bearerAuth: []
      parameters:
        - name: groupBuyId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Group buy ended successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupBuySuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/LeaderRequiredError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  responses:
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    StoreAlreadyExistsError:
      description: The current user already has a store.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    LeaderRequiredError:
      description: The current operation requires a leader/store identity.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BusinessRuleViolationError:
      description: The operation violates a business rule.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    # ── Empty success ──────────────────────────────────────────────
    EmptySuccessResponse:
      type: object
      required:
        - success
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        traceId:
          type: string
          minLength: 1
      additionalProperties: false
    # ── Error ─────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required:
        - success
        - error
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - false
        error:
          $ref: '#/components/schemas/ErrorDetail'
        traceId:
          type: string
          minLength: 1
      additionalProperties: false
    ErrorDetail:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
        details:
          type: object
          nullable: true
      additionalProperties: false
    # ── Health ────────────────────────────────────────────────────
    HealthSuccessResponse:
      type: object
      required:
        - success
        - data
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/HealthData'
        traceId:
          type: string
          minLength: 1
      additionalProperties: false
    HealthData:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          enum:
            - UP
        timestamp:
          type: string
          minLength: 1
      additionalProperties: false
    # ── Auth ──────────────────────────────────────────────────────
    MockLoginSuccessResponse:
      type: object
      required:
        - success
        - data
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/MockLoginData'
        traceId:
          type: string
          minLength: 1
      additionalProperties: false
    MockLoginRequest:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          minLength: 1
        nickname:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
      additionalProperties: false
    MockLoginData:
      type: object
      required:
        - accessToken
        - user
      properties:
        accessToken:
          type: string
          minLength: 1
        user:
          $ref: '#/components/schemas/MockLoginUser'
      additionalProperties: false
    MockLoginUser:
      type: object
      required:
        - id
        - nickname
        - phone
        - hasLeader
      properties:
        id:
          type: integer
          format: int64
        nickname:
          type: string
          minLength: 1
        avatarUrl:
          type: string
          nullable: true
        phone:
          type: string
          minLength: 1
        hasLeader:
          type: boolean
        leaderId:
          type: integer
          format: int64
          nullable: true
        storeId:
          type: integer
          format: int64
          nullable: true
      additionalProperties: false
    CurrentUserSuccessResponse:
      type: object
      required:
        - success
        - data
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/CurrentUserData'
        traceId:
          type: string
          minLength: 1
      additionalProperties: false
    CurrentUserData:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/CurrentUserSummary'
        leader:
          $ref: '#/components/schemas/LeaderSummary'
        store:
          $ref: '#/components/schemas/StoreSummary'
      additionalProperties: false
    CurrentUserSummary:
      type: object
      required:
        - id
        - nickname
        - phone
        - hasLeader
      properties:
        id:
          type: integer
          format: int64
        nickname:
          type: string
          minLength: 1
        avatarUrl:
          type: string
          nullable: true
        phone:
          type: string
          minLength: 1
        hasLeader:
          type: boolean
        leaderId:
          type: integer
          format: int64
          nullable: true
        storeId:
          type: integer
          format: int64
          nullable: true
      additionalProperties: false
    LeaderSummary:
      type: object
      required:
        - id
        - displayName
        - memberCount
        - followerCount
      properties:
        id:
          type: integer
          format: int64
        displayName:
          type: string
          minLength: 1
        avatarUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        memberCount:
          type: integer
          minimum: 0
        followerCount:
          type: integer
          minimum: 0
      additionalProperties: false
    StoreSummary:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
        logoUrl:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        defaultDeliveryType:
          type: string
          minLength: 1
        status:
          type: string
          minLength: 1
      additionalProperties: false
    # ── Store ─────────────────────────────────────────────────────
    CreateStoreRequest:
      type: object
      required:
        - name
        - defaultDeliveryType
      properties:
        name:
          type: string
          minLength: 1
        logoUrl:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        defaultDeliveryType:
          type: string
          enum:
            - express
            - pickup
            - local_delivery
      additionalProperties: false
    UpdateStoreRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        logoUrl:
          type: string
          minLength: 1
          nullable: true
        description:
          type: string
          minLength: 1
          nullable: true
        defaultDeliveryType:
          type: string
          enum:
            - express
            - pickup
            - local_delivery
      additionalProperties: false
    StoreSuccessResponse:
      type: object
      required:
        - success
        - data
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/StoreResponseData'
        traceId:
          type: string
          minLength: 1
      additionalProperties: false
    MyStoreSuccessResponse:
      type: object
      required:
        - success
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          allOf:
            - $ref: '#/components/schemas/StoreResponseData'
          nullable: true
        traceId:
          type: string
          minLength: 1
      additionalProperties: false
    StoreResponseData:
      type: object
      required:
        - leader
        - store
      properties:
        leader:
          $ref: '#/components/schemas/LeaderInfo'
        store:
          $ref: '#/components/schemas/StoreInfo'
      additionalProperties: false
    LeaderInfo:
      type: object
      required:
        - id
        - displayName
      properties:
        id:
          type: integer
          format: int64
        displayName:
          type: string
          minLength: 1
        avatarUrl:
          type: string
          nullable: true
      additionalProperties: false
    StoreInfo:
      type: object
      required:
        - id
        - leaderId
        - name
        - defaultDeliveryType
        - distributionEnabled
        - status
      properties:
        id:
          type: integer
          format: int64
        leaderId:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
        logoUrl:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        defaultDeliveryType:
          type: string
          minLength: 1
        distributionEnabled:
          type: boolean
        status:
          type: string
          minLength: 1
      additionalProperties: false
    # ── Product ───────────────────────────────────────────────────
    ProductSuccessResponse:
      type: object
      required:
        - success
        - data
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/ProductData'
        traceId:
          type: string
          minLength: 1
      additionalProperties: false
    ProductPageSuccessResponse:
      type: object
      required:
        - success
        - data
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/ProductPageData'
        traceId:
          type: string
          minLength: 1
      additionalProperties: false
    ProductPageData:
      type: object
      required:
        - items
        - page
        - pageSize
        - total
        - hasMore
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductData'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        hasMore:
          type: boolean
      additionalProperties: false
    CreateProductRequest:
      type: object
      required:
        - name
        - basePriceAmount
        - stock
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        coverImageUrl:
          type: string
          nullable: true
        basePriceAmount:
          type: integer
          minimum: 0
        stock:
          type: integer
          minimum: 0
      additionalProperties: false
    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        coverImageUrl:
          type: string
          nullable: true
        basePriceAmount:
          type: integer
          minimum: 0
        stock:
          type: integer
          minimum: 0
      additionalProperties: false
    ProductData:
      type: object
      required:
        - id
        - storeId
        - name
        - basePriceAmount
        - stock
        - status
      properties:
        id:
          type: integer
          format: int64
        storeId:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        coverImageUrl:
          type: string
          nullable: true
        basePriceAmount:
          type: integer
          minimum: 0
        stock:
          type: integer
          minimum: 0
        status:
          type: string
          minLength: 1
      additionalProperties: false
    # ── GroupBuy ──────────────────────────────────────────────────
    GroupBuySuccessResponse:
      type: object
      required:
        - success
        - data
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/GroupBuyData'
        traceId:
          type: string
          minLength: 1
      additionalProperties: false
    GroupBuyPageSuccessResponse:
      type: object
      required:
        - success
        - data
        - traceId
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/GroupBuyPageData'
        traceId:
          type: string
          minLength: 1
      additionalProperties: false
    GroupBuyPageData:
      type: object
      required:
        - items
        - page
        - pageSize
        - total
        - hasMore
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GroupBuyDetail'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        hasMore:
          type: boolean
      additionalProperties: false
    CreateGroupBuyRequest:
      type: object
      required:
        - title
        - deliveryType
        - items
      properties:
        title:
          type: string
          minLength: 1
        introduction:
          type: string
          nullable: true
        coverImageUrl:
          type: string
          nullable: true
        deliveryType:
          type: string
        shippingTime:
          type: string
          nullable: true
        startTime:
          type: string
          nullable: true
        endTime:
          type: string
          nullable: true
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateGroupBuyItemEntry'
      additionalProperties: false
    CreateGroupBuyItemEntry:
      type: object
      required:
        - displayName
        - groupPriceAmount
        - groupStock
      properties:
        productId:
          type: integer
          format: int64
          nullable: true
        product:
          $ref: '#/components/schemas/CreateGroupBuyInlineProduct'
        displayName:
          type: string
          minLength: 1
        groupPriceAmount:
          type: integer
