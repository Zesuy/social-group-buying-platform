services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-groupshop}
      MYSQL_USER: ${MYSQL_USER:-groupshop}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$$MYSQL_USER\" --password=\"$$MYSQL_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      JAVA_OPTS: ${JAVA_OPTS:-}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-groupshop}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-groupshop}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      GROUPSHOP_UPLOAD_LOCAL_DIR: /app/uploads
      GROUPSHOP_UPLOAD_PUBLIC_BASE_URL: /uploads
      GROUPSHOP_AI_POLISH_PROVIDER: ${GROUPSHOP_AI_POLISH_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-20}
      SANDBOX_PAYMENT_ENABLED: ${SANDBOX_PAYMENT_ENABLED:-false}
      ALIPAY_SANDBOX_APP_ID: ${ALIPAY_SANDBOX_APP_ID:-}
      ALIPAY_SANDBOX_APP_PRIVATE_KEY: ${ALIPAY_SANDBOX_APP_PRIVATE_KEY:-}
      ALIPAY_SANDBOX_PUBLIC_KEY: ${ALIPAY_SANDBOX_PUBLIC_KEY:-}
      ALIPAY_SANDBOX_GATEWAY: ${ALIPAY_SANDBOX_GATEWAY:-https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      BACKEND_PUBLIC_BASE_URL: ${BACKEND_PUBLIC_BASE_URL:-http://localhost}
      FRONTEND_PUBLIC_BASE_URL: ${FRONTEND_PUBLIC_BASE_URL:-http://localhost}
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health | grep -q 'UP'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  mysql_data:
  backend_uploads:
