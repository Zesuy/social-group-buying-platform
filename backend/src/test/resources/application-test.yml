spring:
  datasource:
    url: jdbc:h2:mem:groupshop;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  h2:
    console:
      enabled: false

groupshop:
  upload:
    local-dir: ./target/test-uploads
    public-base-url: http://localhost:8080/uploads
