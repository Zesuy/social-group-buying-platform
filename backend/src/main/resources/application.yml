server:
  port: 8080

spring:
  application:
    name: groupshop
  datasource:
    url: jdbc:mysql://localhost:3306/groupshop?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX
    time-zone: Asia/Shanghai
    property-naming-strategy: LOWER_CAMEL_CASE
    default-property-inclusion: non_null
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

groupshop:
  upload:
    local-dir: ./uploads
    public-base-url: /uploads
  ai:
    polish:
      provider: ${GROUPSHOP_AI_POLISH_PROVIDER:local}
      openai:
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
        model: ${OPENAI_MODEL:gpt-4.1-mini}
        timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:20}
  payment:
    sandbox:
      enabled: ${SANDBOX_PAYMENT_ENABLED:false}
    alipay:
      app-id: ${ALIPAY_SANDBOX_APP_ID:}
      app-private-key: ${ALIPAY_SANDBOX_APP_PRIVATE_KEY:}
      public-key: ${ALIPAY_SANDBOX_PUBLIC_KEY:}
      gateway: ${ALIPAY_SANDBOX_GATEWAY:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      backend-public-base-url: ${BACKEND_PUBLIC_BASE_URL:http://localhost:8080}
      frontend-public-base-url: ${FRONTEND_PUBLIC_BASE_URL:http://localhost:5173}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
